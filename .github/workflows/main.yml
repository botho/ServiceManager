name: Build Windows (Qt MSVC)

on: [push, pull_request]

jobs:
  windows:
    name: Windows Qt Build
    runs-on: windows-latest

    env:
      QT_VERSION: "6.8.3"
      QT_ARCH: "win64_msvc2022_64"

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Python (évite bugs WindowsApps)
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # MSVC environment
      # -------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -------------------------
      # Qt install (optimisé + cache)
      # -------------------------
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}

      # -------------------------
      # Build (qmake)
      # -------------------------
      - name: Run QMake
        run: qmake ServiceCreator.pro -config release

      - name: Build (MSVC)
        run: nmake release

      # -------------------------
      # Deploy avec windeployqt
      # -------------------------
      - name: Deploy Qt libraries
        run: |
          mkdir deploy
          copy release\ServiceCreator.exe deploy\
          windeployqt --release --no-translations deploy\ServiceCreator.exe
        shell: cmd

      # -------------------------
      # Créer un archive ZIP
      # -------------------------
      - name: Create portable ZIP
        run: |
          cd deploy
          tar.exe -a -c -f ..\ServiceCreator-portable.zip *
          cd ..
        shell: cmd

      # -------------------------
      # Artefacts
      # -------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ServiceCreator-windows-portable
          path: ServiceCreator-portable.zip
          retention-days: 30