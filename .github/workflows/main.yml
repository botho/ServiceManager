name: Build Windows
on: [push, pull_request]

jobs:
  windows:
    name: Windows - Qt Build
    runs-on: windows-latest
    steps:

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'   # build dynamique, disponible via aqt

      - name: Run QMake
        run: qmake ServiceCreator.pro CONFIG+=release

      - name: Build
        run: nmake release

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir release-pkg
          copy release\BMWServiceHistoryManager.exe release-pkg\
          windeployqt --release --no-translations release-pkg\BMWServiceHistoryManager.exe

      - name: Package
        shell: cmd
        run: 7z a BMWServiceHistoryManager-Portable.7z release-pkg\*

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: BMWServiceHistoryManager-Portable
          path: BMWServiceHistoryManager-Portable.7z
          retention-days: 30