name: Build Windows (Qt MSVC) - Portable Executable

on: [push, pull_request]

jobs:
  windows:
    name: Windows Qt Build - Portable
    runs-on: windows-latest

    env:
      QT_VERSION: "6.8.3"
      QT_ARCH: "win64_msvc2022_64"

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Python (évite bugs WindowsApps)
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # MSVC environment
      # -------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -------------------------
      # Qt install STATIC (optimisé + cache)
      # -------------------------
      - name: Install Qt Static
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          static: 'true'
          cache: true
          cache-key-prefix: qt-static-${{ env.QT_VERSION }}

      # -------------------------
      # Build (qmake)
      # -------------------------
      - name: Run QMake
        run: qmake ServiceCreator.pro -config release

      - name: Build (MSVC)
        run: nmake release

      # -------------------------
      # Debug: List build artifacts
      # -------------------------
      - name: Check build output
        run: |
          echo "=== Listing release directory ==="
          dir /s release\
          echo.
          echo "=== Checking for executable ==="
          if exist "release\BMWServiceHistoryManager.exe" (
            echo Found: release\BMWServiceHistoryManager.exe
            dir release\BMWServiceHistoryManager.exe
          ) else (
            echo ERROR: release\BMWServiceHistoryManager.exe not found!
            exit 1
          )
        shell: cmd

      # -------------------------
      # Deploy - Executable seul (tout embarqué)
      # -------------------------
      - name: Deploy Executable
        run: |
          echo "=== Listing release directory ==="
          dir /s release\
          echo.
          if exist "release\BMWServiceHistoryManager.exe" (
            mkdir BMWServiceHistoryManager-Portable
            copy release\BMWServiceHistoryManager.exe BMWServiceHistoryManager-Portable\
            echo.
            echo "=== Executable déployé (statique, sans DLLs) ==="
            dir BMWServiceHistoryManager-Portable\
          ) else (
            echo ERROR: Executable not found!
            exit 1
          )
        shell: cmd

      # -------------------------
      # Créer archive contenant l'unique executable
      # -------------------------
      - name: Create Archive
        run: |
          7z a -r BMWServiceHistoryManager-Portable.7z BMWServiceHistoryManager-Portable\BMWServiceHistoryManager.exe
          echo.
          echo "=== Archive created ==="
          dir BMWServiceHistoryManager-Portable.7z
        shell: cmd

      # -------------------------
      # Upload - Artefact unique
      # -------------------------
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BMWServiceHistoryManager-Portable
          path: BMWServiceHistoryManager-Portable.7z
          retention-days: 30