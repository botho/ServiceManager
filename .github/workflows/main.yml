name: Build Windows (Qt MSVC) - Portable Executable

on: [push, pull_request]

jobs:
  windows:
    name: Windows Qt Build - Portable
    runs-on: windows-latest

    env:
      QT_VERSION: "6.8.3"
      QT_ARCH: "win64_msvc2022_64"

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Python (évite bugs WindowsApps)
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # MSVC environment
      # -------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -------------------------
      # Qt install (optimisé + cache)
      # -------------------------
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}

      # -------------------------
      # Build (qmake)
      # -------------------------
      - name: Run QMake
        run: qmake ServiceCreator.pro -config release

      - name: Build (MSVC)
        run: nmake release

      # -------------------------
      # Deploy avec windeployqt - Portable Standalone
      # -------------------------
      - name: Deploy Qt libraries
        run: |
          mkdir BMWServiceHistoryCreator-Portable
          copy release\BMWServiceHistoryCreator.exe BMWServiceHistoryCreator-Portable\
          windeployqt --release --no-translations BMWServiceHistoryCreator-Portable\BMWServiceHistoryCreator.exe
        shell: cmd

      # -------------------------
      # Créer un unique artefact 7z compressé
      # -------------------------
      - name: Create 7z Portable Archive
        run: |
          7z a -r BMWServiceHistoryCreator-Portable.7z BMWServiceHistoryCreator-Portable\*
        shell: cmd

      # -------------------------
      # Upload - Artefact unique
      # -------------------------
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BMWServiceHistoryCreator-Portable
          path: BMWServiceHistoryCreator-Portable.7z
          retention-days: 30