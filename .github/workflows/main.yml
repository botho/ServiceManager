name: Build Windows (Qt MSVC) - Portable Executable

on: [push, pull_request]

jobs:
  windows:
    name: Windows Qt Build - Portable
    runs-on: windows-latest

    env:
      QT_VERSION: "6.8.3"
      QT_ARCH: "win64_msvc2022_64"

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Python (évite bugs WindowsApps)
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------
      # MSVC environment
      # -------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -------------------------
      # Qt install (optimisé + cache)
      # -------------------------
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          cache: true
          cache-key-prefix: qt-${{ env.QT_VERSION }}

      # -------------------------
      # Build (qmake)
      # -------------------------
      - name: Run QMake
        run: qmake ServiceCreator.pro -config release

      - name: Build (MSVC)
        run: nmake release

      # -------------------------
      # Debug: List build artifacts
      # -------------------------
      - name: Check build output
        run: |
          echo "=== Listing release directory ==="
          dir /s release\
          echo.
          echo "=== Checking for executable ==="
          if exist "release\ServiceCreator.exe" (
            echo Found: release\ServiceCreator.exe
            dir release\ServiceCreator.exe
          ) else (
            echo ERROR: release\ServiceCreator.exe not found!
            exit 1
          )
        shell: cmd

      # -------------------------
      # Deploy avec windeployqt - Portable Standalone
      # -------------------------
      - name: Deploy Qt libraries
        run: |
          mkdir BMWServiceHistoryManager-Portable
          copy release\ServiceCreator.exe BMWServiceHistoryManager-Portable\BMWServiceHistoryManager.exe
          windeployqt --release --no-translations BMWServiceHistoryManager-Portable\BMWServiceHistoryManager.exe
          echo.
          echo "=== Deployment complete. Listing portable directory ==="
          dir /s BMWServiceHistoryManager-Portable\
        shell: cmd

      # -------------------------
      # Créer un unique artefact 7z compressé
      # -------------------------
      - name: Create 7z Portable Archive
        run: |
          7z a -r BMWServiceHistoryManager-Portable.7z BMWServiceHistoryManager-Portable\*
        shell: cmd

      # -------------------------
      # Upload - Artefact unique
      # -------------------------
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BMWServiceHistoryManager-Portable
          path: BMWServiceHistoryManager-Portable.7z
          retention-days: 30